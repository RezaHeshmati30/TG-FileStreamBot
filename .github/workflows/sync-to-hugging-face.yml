name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hugging-face-space-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Sync repository to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: >-
          uvx --from huggingface_hub hf upload
          "$HF_SPACE_ID"
          .
          .
          --repo-type space
          --exclude ".git*"
          --exclude ".github*"
          --delete "*"
          --commit-message "Sync from GitHub"
